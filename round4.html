<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title> ROUND 4</title>

<style>
html, body {margin:0;font-family:sans-serif;background:linear-gradient(135deg,#0f172a,#1e293b);color:white;padding:20px;}
h1{text-align:center;color:#22c55e;}

.nav{text-align:center;margin-bottom:15px;font-size:18px;}
.nav a{color:#38bdf8;text-decoration:none;margin:0 10px;}

.container{display:flex;gap:20px;}
.left{width:60%;} .right{width:40%;}

.main-card{background:rgba(255,255,255,0.06);border-radius:18px;padding:20px;}
.inner-card{background:rgba(0,0,0,0.25);padding:15px;border-radius:12px;}

table{width:100%;border-spacing:0 8px;}
td,th{padding:10px;text-align:center;}
tbody tr{background:rgba(255,255,255,0.05);}

textarea,input{
border:none;border-radius:8px;
background:rgba(255,255,255,0.1);
color:white;
}

textarea{width:100%;height:50px;}
input{padding:6px;}

textarea[readonly], input[readonly]{cursor:pointer;}

.search{width:100%;padding:10px;margin-bottom:10px;}

button{
margin-top:15px;
padding:10px 15px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
cursor:pointer;
}

.pending{color:#facc15;font-weight:bold;}
.done{color:#22c55e;font-weight:bold;}
</style>

</head>

<body>

<h1> ROUND 4</h1>

<div class="nav">
<a href="index.html">🧩 Round 1</a> |
<a href="round2.html">⚡ Round 2</a> |
<a href="round3.html">🎯 Round 3</a> |
<a href="round4.html">🏁 Final</a>
</div>

<div class="container">

<div class="left main-card">
<h2>🎯 Team Panel</h2>

<div class="inner-card">
<input id="searchBox2" class="search" placeholder="Search team..." oninput="instantSearch()">

<table id="panel">
<thead>
<tr>
<th>Team</th>
<th>Score</th>
<th>Time</th>
<th>Status</th>
</tr>
</thead>
<tbody></tbody>
</table>

<button onclick="downloadCSV()">⬇️ Download CSV</button>

</div>
</div>

<div class="right main-card">
<h2>🏆 Leaderboard</h2>
<div class="inner-card">
<div id="board"></div>
</div>
</div>

</div>

<script>

const STORAGE_KEY = "scores_round4";
const SHEET_URL = "https://script.google.com/macros/s/AKfycbymKJnnq2Hs7xJmwoxQEuxOHz3G1vHRvS7SJqS_cWJJja6FmCFENQMFcp3xbobCKC_B/exec";

const teams = [
"PASTE YOUR TOP 10 TEAMS HERE"
];

// SEND
function sendToSheet(team, score, time){
  fetch(SHEET_URL,{
    method:"POST",
    headers:{ "Content-Type":"text/plain" },
    body: JSON.stringify({ team, score, time })
  });
}

// TIME PARSE
function parseTimeInput(val){
  val = val.replace(/\D/g,"");
  if(!val) return null;

  let min=0,sec=0;

  if(val.length>=3){
    sec=parseInt(val.slice(-2));
    min=parseInt(val.slice(0,-2));
  } else sec=parseInt(val);

  return { ms:(min*60+sec)*1000, text:`${min}m ${sec}s` };
}

// PANEL
function loadPanel(){
  let tbody = document.querySelector("#panel tbody");

  teams.forEach((t,i)=>{
    let row = document.createElement("tr");

    row.innerHTML = `
      <td>${t}</td>
      <td><textarea id="score${i}" onkeydown="handleScore(event,${i})"></textarea></td>

```
  <td><input id="time${i}" onkeydown="handleTime(event,${i})"></td>
  <td id="status${i}">-</td>
`;

tbody.appendChild(row);
```

});
}

// TIME
function handleTime(e,i){
if(e.key==="Enter"){
e.preventDefault();

let parsed = parseTimeInput(document.getElementById("time"+i).value);
if(!parsed) return alert("Invalid time");

let data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

let row = data.find(d=>d.team===teams[i]);

if(!row){
row = { team:teams, score:null, time:parsed.ms, timeText:parsed.text, sent:false };
data.push(row);
} else {
row.time = parsed.ms;
row.timeText = parsed.text;
row.sent=false;
}

localStorage.setItem(STORAGE_KEY, JSON.stringify(data));

let t=document.getElementById("time"+i);
t.readOnly=true;
t.ondblclick=()=>{t.readOnly=false; t.focus();};

document.getElementById("status"+i).innerHTML = '<span class="pending">🟡 Pending</span>';

document.getElementById("score"+i).focus();

loadBoard();
}
}

// SCORE
function handleScore(e,i){
if(e.key==="Enter"){
e.preventDefault();

let val = document.getElementById("score"+i).value.trim();
if(!val) return;

let data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
let row = data.find(d=>d.team===teams[i]);

if(!row) return alert("Enter time first!");

row.score = parseInt(val) || 0;

if(!row.sent){
sendToSheet(row.team, row.score, row.timeText);
row.sent = true;
}

let s=document.getElementById("score"+i);
s.readOnly=true;
s.ondblclick=()=>{s.readOnly=false; s.focus();};

document.getElementById("status"+i).innerHTML = `<span class="done">🟢 ${row.score} submitted</span>`;

localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
loadBoard();
}
}

// SEARCH
function instantSearch(){
let val = document.getElementById("searchBox2").value.toLowerCase();

document.querySelectorAll("#panel tbody tr").forEach(r=>{
r.style.display = r.cells[0].innerText.toLowerCase().includes(val) ? "" : "none";
});
}

// LEADERBOARD
function loadBoard(){
let data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

data.sort((a,b)=>{
let s1 = b.score ?? -1;
let s2 = a.score ?? -1;
if(s1!==s2) return s1 - s2;
return (a.time||Infinity) - (b.time||Infinity);
});

let html="<table><tr><th>Rank</th><th>Team</th><th>Score</th><th>Time</th></tr>";

data.forEach((d,i)=>{
html+=`<tr>

<td>${i+1}</td>
<td>${d.team}</td>
<td>${d.score ?? "-"}</td>
<td>${d.timeText ?? "-"}</td>
</tr>`;
});

html+="</table>";
document.getElementById("board").innerHTML = html;
}

// CSV DOWNLOAD
function downloadCSV(){
let data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

data = data.filter(d => d.score != null);

data.sort((a,b)=>{
let s1 = b.score ?? -1;
let s2 = a.score ?? -1;
if(s1 !== s2) return s1 - s2;
return (a.time || Infinity) - (b.time || Infinity);
});

let csv = "Rank,Team,Score,Time\n";

data.forEach((d,i)=>{
csv += `${i+1},${d.team},${d.score},${d.timeText || ""}\n`;
});

let blob = new Blob([csv], { type: "text/csv" });
let url = URL.createObjectURL(blob);

let a = document.createElement("a");
a.href = url;
a.download = STORAGE_KEY + ".csv";
a.click();
}

// INIT
window.onload = ()=>{
loadPanel();
loadBoard();
};

</script>

</body>
</html>
