<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ROUND 4 - FINAL</title>

<style>
html, body {margin:0;font-family:sans-serif;background:#0f172a;color:white;padding:20px;}
h1{text-align:center;color:#22c55e;}

.nav{text-align:center;margin-bottom:15px;}
.nav a{color:#38bdf8;margin:0 10px;text-decoration:none;}

table{width:100%;border-spacing:0 8px;}
td,th{padding:10px;text-align:center;}
tbody tr{background:#1e293b;}

textarea,input{
border:none;border-radius:8px;
background:#334155;color:white;
padding:6px;
}

textarea{width:100%;height:40px;}
textarea[readonly],input[readonly]{cursor:pointer;}

button{
margin-top:10px;
padding:8px 12px;
border:none;border-radius:8px;
background:#22c55e;color:white;
cursor:pointer;
}

.reset-btn{background:red;}

.pending{color:#facc15;}
.done{color:#22c55e;}
</style>
</head>

<body>

<h1>🏁 ROUND 4 - FINAL</h1>

<div class="nav">
<a href="index.html">Round 1</a> |
<a href="round2.html">Round 2</a> |
<a href="round3.html">Round 3</a> |
<a href="round4.html">Final</a>
</div>

<input id="searchBox" placeholder="Search team..." oninput="instantSearch()">

<table id="panel">
<thead>
<tr>
<th>Team</th>
<th>Score</th>
<th>Time</th>
<th>Status</th>
</tr>
</thead>
<tbody></tbody>
</table>

<button onclick="downloadCSV()">⬇️ Download CSV</button>
<button class="reset-btn" onclick="resetAll()">🗑 Reset</button>

<h2>🏆 FINAL LEADERBOARD</h2>
<div id="board"></div>

<script>

const STORAGE_KEY="scores_round4";

// 👉 PUT TOP FINAL TEAMS HERE
const teams=[
"TEAM A","TEAM B","TEAM C"
];

// LOAD PANEL
function loadPanel(){
let tbody=document.querySelector("#panel tbody");
tbody.innerHTML="";

teams.forEach((t,i)=>{
let r=document.createElement("tr");

r.innerHTML=`
<td>${t}</td>
<td><textarea id="score${i}" onkeydown="handleScore(event,${i})"></textarea></td>
<td><input id="time${i}" onkeydown="handleTime(event,${i})"></td>
<td id="status${i}">-</td>
`;

tbody.appendChild(r);
});
}

// TIME PARSE
function parseTime(v){
v=v.replace(/\D/g,"");
if(!v) return null;

let m=0,s=0;
if(v.length>=3){
s=parseInt(v.slice(-2));
m=parseInt(v.slice(0,-2));
}else s=parseInt(v);

return {ms:(m*60+s)*1000,text:`${m}m ${s}s`};
}

// HANDLE TIME
function handleTime(e,i){
if(e.key==="Enter"){
e.preventDefault();

let p=parseTime(time(i).value);
if(!p) return alert("Invalid time");

let data=getData();
let row=getRow(data,i);

row.time=p.ms;
row.timeText=p.text;

save(data);

time(i).readOnly=true;
time(i).ondblclick=()=>{time(i).readOnly=false; time(i).focus();};

status(i,"🟡 Pending");

score(i).focus();

loadBoard();
}
}

// HANDLE SCORE
function handleScore(e,i){
if(e.key==="Enter"){
e.preventDefault();

let val=score(i).value.trim();
if(!val) return;

let data=getData();
let row=getRow(data,i);

if(!row.time) return alert("Enter time first!");

row.score=parseInt(val)||0;

save(data);

score(i).readOnly=true;
score(i).ondblclick=()=>{score(i).readOnly=false; score(i).focus();};

status(i,`🟢 ${row.score}`);

loadBoard();
}
}

// RESTORE
function restore(){
let data=getData();

data.forEach(d=>{
let i=teams.indexOf(d.team);
if(i===-1) return;

if(d.timeText){
time(i).value=d.timeText;
time(i).readOnly=true;
}

if(d.score!=null){
score(i).value=d.score;
score(i).readOnly=true;
status(i,`🟢 ${d.score}`);
}
});
}

// LEADERBOARD
function loadBoard(){
let data=getData();

data.sort((a,b)=>{
let s1=b.score??-1;
let s2=a.score??-1;
if(s1!==s2) return s1-s2;
return (a.time||Infinity)-(b.time||Infinity);
});

let html="<table><tr><th>Rank</th><th>Team</th><th>Score</th><th>Time</th></tr>";

data.forEach((d,i)=>{
html+=`
<tr>
<td>${i+1}</td>
<td>${d.team}</td>
<td>${d.score??"-"}</td>
<td>${d.timeText??"-"}</td>
</tr>`;
});

html+="</table>";

document.getElementById("board").innerHTML=html;
}

// SEARCH
function instantSearch(){
let val=document.getElementById("searchBox").value.toLowerCase();

document.querySelectorAll("#panel tbody tr").forEach(r=>{
r.style.display=r.cells[0].innerText.toLowerCase().includes(val)?"":"none";
});
}

// CSV
function downloadCSV(){
let data=getData();

let csv="Rank,Team,Score,Time\n";

data.forEach((d,i)=>{
csv+=`${i+1},${d.team},${d.score||""},${d.timeText||""}\n`;
});

let blob=new Blob([csv]);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="round4.csv";
a.click();
}

// RESET
function resetAll(){
if(confirm("Reset ALL final data?")){
localStorage.removeItem(STORAGE_KEY);
location.reload();
}
}

// HELPERS
function getData(){
return JSON.parse(localStorage.getItem(STORAGE_KEY))||[];
}

function save(d){
localStorage.setItem(STORAGE_KEY,JSON.stringify(d));
}

function getRow(data,i){
let row=data.find(x=>x.team===teams[i]);
if(!row){
row={team:teams[i]};
data.push(row);
}
return row;
}

function score(i){return document.getElementById("score"+i);}
function time(i){return document.getElementById("time"+i);}
function status(i,t){document.getElementById("status"+i).innerHTML=t;}

// INIT
window.onload=()=>{
loadPanel();
restore();
loadBoard();
};

</script>

</body>
</html>
