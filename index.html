<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TECH CONNECTION</title>

<style>
html, body {
  margin:0;
  font-family:sans-serif;
  background: linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
  padding:20px;
}

/* HEADER */
h1{
  text-align:center;
  color:#22c55e;
}

/* TIMER */
#timer{
  text-align:center;
  font-size:180px; /* reduced */
  font-weight:bold;
  margin:15px 0;
}

/* LAYOUT */
.container{
  display:flex;
  gap:20px;
}

.card{
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:15px;
  flex:1;
}

/* WIDTH */
.left{ width:55%; }
.right{ width:45%; }

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
  font-size:18px; /* bigger text */
}

th,td{
  padding:10px;
  text-align:center;
}

th{
  font-size:18px;
}

/* INPUT */
textarea{
  width:100%;
  height:50px;
  border-radius:8px;
  border:none;
  background:rgba(255,255,255,0.1);
  color:white;
}

/* SEARCH */
.search{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  margin-bottom:10px;
}

/* BUTTON */
button{
  padding:8px 14px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:white;
  cursor:pointer;
}

/* 🔥 SPLIT MODE */
.split-mode #timer{
  font-size:100px;
  position: sticky;
  top: 0;
  z-index: 1000;
  background:#0f172a;
  padding:10px 0;
}

.split-mode .left{
  display:flex;
  flex-direction:column;
  width:45%;
}

.split-mode .right{
  width:55%;
}

.split-mode .left.card{
  height:calc(100vh - 220px);
  overflow:auto;
}

/* STICKY LEADERBOARD HEADER */
.split-mode .right th{
  position: sticky;
  top: 0;
  background:#1e293b;
  z-index:10;
}

</style>
</head>

<body>

<h1>⚡ TECH CONNECTION</h1>

<div style="text-align:center;">
  <button onclick="startTimer()">Start Event</button>
  <button onclick="toggleSplit()">Split Display</button>
  <button onclick="resetAll()">Reset</button>
</div>

<h2 id="timer">0m 0s</h2>

<div class="container">

<div class="left card">
  <h2>🎯 Team Panel</h2>

  <input id="searchBox2" class="search" placeholder="Search team..." onkeyup="filterPanel()">

  <table id="panel">
    <tr>
      <th>Team</th>
      <th>Score</th>
      <th>Action</th>
      <th>Time</th>
    </tr>
  </table>

  <button onclick="updateScores()">Update Scores</button>
</div>

<div class="right card">
  <h2>🏆 Leaderboard</h2>
  <div id="board"></div>
  <button onclick="exportCSV()">Export CSV</button>
</div>

</div>

<script>

// TEAMS
const teams = [];
for(let i=1;i<=50;i++){ teams.push("Team "+i); }

let startTime = 0;
let timerStarted = false;

// ANSWERS
const answers = [
"ALGORITHM","WEB BROWSER","BACKUP","FOOD DELIVERY","VIDEO PLATFORM",
"CLOUD","STREAMING SERVICE","PIXEL","MESSAGING APP","STACK",
"SOCIAL MEDIA","CAB SERVICE","EMAIL","URL","PASSWORD"
];

// CLEAN TEXT
function cleanText(t){
  return t.toUpperCase().replace(/[^A-Z]/g,"");
}

// TIMER
function formatTime(sec){
  return Math.floor(sec/60)+"m "+(sec%60)+"s";
}

function startTimer(){
  if(timerStarted) return;
  timerStarted = true;
  startTime = Date.now();

  setInterval(function(){
    let t = Math.floor((Date.now()-startTime)/1000);
    document.getElementById("timer").innerText = formatTime(t);
  },1000);
}

// LOAD PANEL
function loadPanel(){
  let table = document.getElementById("panel");

  for(let i=0;i<teams.length;i++){
    let row = table.insertRow(-1);

    row.innerHTML =
      "<td>"+teams[i]+"</td>"+
      "<td><textarea id='score"+i+"'></textarea></td>"+
      "<td><button id='btn"+i+"' onclick='finishTeam("+i+")'>Finish</button></td>"+
      "<td id='time"+i+"'>-</td>";
  }
}

// FINISH TEAM
function finishTeam(i){

  let time = Math.floor((Date.now()-startTime)/1000);

  document.getElementById("time"+i).innerText = formatTime(time);
  document.getElementById("btn"+i).disabled = true;

  let data = JSON.parse(localStorage.getItem("scores")) || [];

  data.push({team:teams[i], time:time, score:null});

  localStorage.setItem("scores", JSON.stringify(data));

  loadBoard();
}

// UPDATE SCORES
function updateScores(){

  let data = JSON.parse(localStorage.getItem("scores")) || [];

  for(let j=0;j<data.length;j++){

    let row = data[j];
    let index = teams.indexOf(row.team);

    let val = document.getElementById("score"+index).value;

    if(!val) continue;

    let numberMatch = val.match(/\d+/);
    let manual = numberMatch ? parseInt(numberMatch[0]) : 0;

    let fullText = cleanText(val);
    let detected = 0;

    for(let k=0;k<answers.length;k++){
      if(fullText.includes(cleanText(answers[k]))){
        detected++;
      }
    }

    row.score = Math.max(manual, detected);
  }

  localStorage.setItem("scores", JSON.stringify(data));

  loadBoard();
}

// FILTER
function filterPanel(){

  let search = document.getElementById("searchBox2").value.toLowerCase();
  let rows = document.querySelectorAll("#panel tr");

  for(let i=1;i<rows.length;i++){
    let team = rows[i].cells[0].innerText.toLowerCase();
    rows[i].style.display = team.includes(search) ? "" : "none";
  }
}

// LEADERBOARD
function loadBoard(){

  let data = JSON.parse(localStorage.getItem("scores")) || [];

  let html = "<table><tr><th>Rank</th><th>Team</th><th>Score</th><th>Time</th></tr>";

  let hasScores = data.some(d => d.score !== null);

  data.sort(function(a,b){

    if(hasScores){
      if((b.score||0)!==(a.score||0)){
        return (b.score||0)-(a.score||0);
      }
      return a.time - b.time;
    } else {
      return a.time - b.time;
    }

  });

  for(let i=0;i<data.length;i++){
    html += "<tr>"+
      "<td>"+(i+1)+"</td>"+
      "<td>"+data[i].team+"</td>"+
      "<td>"+(data[i].score||"-")+"</td>"+
      "<td>"+formatTime(data[i].time)+"</td>"+
    "</tr>";
  }

  html += "</table>";

  document.getElementById("board").innerHTML = html;
}

// EXPORT
function exportCSV(){

  let data = JSON.parse(localStorage.getItem("scores")) || [];

  let csv = "Rank,Team,Score,Time\n";

  data.forEach((row,i)=>{
    csv += `${i+1},${row.team},${row.score||0},${formatTime(row.time)}\n`;
  });

  let blob = new Blob([csv], {type:"text/csv"});

  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "leaderboard.csv";
  a.click();
}

// SPLIT MODE
function toggleSplit(){
  document.body.classList.toggle("split-mode");
}

// RESET
function resetAll(){
  localStorage.removeItem("scores");
  location.reload();
}

// INIT
window.onload = function(){
  localStorage.removeItem("scores");
  loadPanel();
};

</script>

</body>
</html>
