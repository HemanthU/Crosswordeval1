<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TECH CONNECTION</title>

<style>
html, body {
  margin:0;
  font-family:sans-serif;
  background: linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
  padding:20px;
}

h1{
  text-align:center;
  color:#22c55e;
}

.top-controls{
  text-align:center;
  margin-bottom:10px;
}

button{
  padding:8px 14px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:white;
  cursor:pointer;
  margin:5px;
}

.main-card{
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(12px);
  border-radius: 18px;
  padding: 20px;
  margin-bottom:15px;
  border: 1px solid rgba(34,197,94,0.2);
}

.inner-card{
  background: rgba(0,0,0,0.25);
  padding: 15px;
  border-radius: 12px;
}

/* 🔥 LAYOUT (UPDATED) */
.container{
  display:flex;
  gap:20px;
}

.left{ width:60%; }
.right{ width:40%; }

/* 🔥 TIMER (REDUCED) */
.timer-card{
  height:55vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

#timer{
  font-size:170px;
  font-weight:800;
  white-space: nowrap;
  line-height:1;
  margin:0;
}

/* TABLE */
table{
  width:100%;
  border-collapse:separate;
  border-spacing:0 8px;
}

th{
  position:sticky;
  top:0;
  background:#0f172a;
  color:#22c55e;
}

td, th{
  padding:10px;
  text-align:center;
}

tbody tr{
  background: rgba(255,255,255,0.05);
  border-radius:10px;
}

/* Leaderboard compact */
#board table{
  font-size:14px;
}

textarea{
  width:100%;
  height:50px;
  border-radius:8px;
  border:none;
  background:rgba(255,255,255,0.1);
  color:white;
}

.search{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  margin-bottom:10px;
}
</style>
</head>

<body>

<h1>⚡ TECH CONNECTION</h1>

<div class="top-controls">
  <button onclick="startTimer()">Start Event</button>
  <button onclick="resetAll()">Reset</button>
  <button onclick="toggleFullscreen()">Fullscreen</button>
</div>

<audio id="buzzer" src="buzzer.mp3" preload="auto"></audio>

<div class="container">

<div class="left main-card">

  <div class="main-card timer-card">
    <h2 id="timer">20m 0s</h2>
  </div>

  <h2>🎯 Team Panel</h2>

  <div class="inner-card">
    <input id="searchBox2" class="search" placeholder="Search team..." onkeyup="filterPanel()">

    <table id="panel">
      <thead>
        <tr>
          <th>Team</th>
          <th>Score</th>
          <th>Action</th>
          <th>Time</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

</div>

<div class="right main-card">

  <h2>🏆 Leaderboard</h2>

  <div class="inner-card">
    <div id="board"></div>
  </div>

  <button onclick="exportCSV()">Export CSV</button>

</div>

</div>

<script>

const answers = [
  "ALGORITHM","WEB BROWSER","BACKUP","FOOD DELIVERY","VIDEO PLATFORM",
  "CLOUD","STREAMING SERVICE","PIXEL","MESSAGING APP","STACK",
  "SOCIAL MEDIA","CAB SERVICE","EMAIL","URL","PASSWORD"
];

const teams = [];
for(let i=1;i<=50;i++){ teams.push("Team "+i); }

let startTime = 0;
let timerStarted = false;

function formatTime(sec){
  return Math.floor(sec/60)+"m "+(sec%60)+"s";
}

function calculateScore(value){
  let num = value.match(/\d+/);
  let manual = num ? parseInt(num[0]) : 0;

  let txt = value.toUpperCase().replace(/[^A-Z]/g,"");
  let detected = 0;

  answers.forEach(ans=>{
    if(txt.includes(ans.replace(/[^A-Z]/g,""))){
      detected++;
    }
  });

  return Math.max(manual, detected);
}

// TIMER
function startTimer(){
  if(timerStarted) return;
  timerStarted = true;
  startTime = Date.now();

  let duration = 20 * 60;
  let sound = document.getElementById("buzzer");
  sound.play().then(()=> sound.pause());

  let interval = setInterval(()=>{
    let elapsed = Math.floor((Date.now()-startTime)/1000);
    let remaining = duration - elapsed;

    if(remaining <= 0){
      document.getElementById("timer").innerText = "0m 0s";
      sound.currentTime = 0;
      sound.play();
      clearInterval(interval);
      return;
    }

    document.getElementById("timer").innerText = formatTime(remaining);

  },1000);
}

// PANEL
function loadPanel(){
  let tbody = document.querySelector("#panel tbody");

  for(let i=0;i<teams.length;i++){
    let row = document.createElement("tr");

    row.innerHTML =
      "<td>"+teams[i]+"</td>"+
      "<td><textarea id='score"+i+"' onkeydown='handleEnter(event,"+i+"); handleNavigation(event,"+i+")'></textarea></td>"+
      "<td><button id='btn"+i+"' onclick='finishTeam("+i+")'>Finish</button></td>"+
      "<td id='time"+i+"'>-</td>";

    tbody.appendChild(row);
  }
}

// ENTER AUTO FINISH
function handleEnter(e,i){
  if(e.key === "Enter"){
    e.preventDefault();

    let val = document.getElementById("score"+i).value.trim();
    if(!val) return;

    let data = JSON.parse(localStorage.getItem("scores")) || [];
    let team = teams[i];

    let row = data.find(d => d.team === team);

    if(!row){
      finishTeam(i);
      data = JSON.parse(localStorage.getItem("scores")) || [];
      row = data.find(d => d.team === team);
    }

    row.score = calculateScore(val);

    localStorage.setItem("scores", JSON.stringify(data));
    loadBoard();

    let next = document.getElementById("score"+(i+1));
    if(next) next.focus();
  }
}

// NAVIGATION
function handleNavigation(e, i){

  if(e.key === "ArrowDown"){
    e.preventDefault();
    let next = document.getElementById("score"+(i+1));
    if(next) next.focus();
  }

  if(e.key === "ArrowUp"){
    e.preventDefault();
    let prev = document.getElementById("score"+(i-1));
    if(prev) prev.focus();
  }
}

// FINISH
function finishTeam(i){
  let time = Date.now() - startTime;

  document.getElementById("time"+i).innerText =
    formatTime(Math.floor(time/1000));

  document.getElementById("btn"+i).disabled = true;

  let data = JSON.parse(localStorage.getItem("scores")) || [];
  data.push({team:teams[i], time:time, score:0});
  localStorage.setItem("scores", JSON.stringify(data));

  loadBoard();
}

// FILTER
function filterPanel(){
  let search = document.getElementById("searchBox2").value.toLowerCase();
  let rows = document.querySelectorAll("#panel tbody tr");

  rows.forEach(row=>{
    let team = row.cells[0].innerText.toLowerCase();
    row.style.display = team.includes(search) ? "" : "none";
  });
}

// LEADERBOARD
function loadBoard(){
  let data = JSON.parse(localStorage.getItem("scores")) || [];

  data.sort((a,b)=>{
    if((b.score||0)!==(a.score||0)){
      return (b.score||0)-(a.score||0);
    }
    return a.time - b.time;
  });

  let html = "<table><thead><tr><th>Rank</th><th>Team</th><th>Score</th><th>Time</th></tr></thead><tbody>";

  data.forEach((d,i)=>{
    html += `<tr>
      <td>${i+1}</td>
      <td>${d.team}</td>
      <td>${d.score||0}</td>
      <td>${formatTime(Math.floor(d.time/1000))}</td>
    </tr>`;
  });

  html += "</tbody></table>";
  document.getElementById("board").innerHTML = html;
}

// EXPORT
function exportCSV(){
  let data = JSON.parse(localStorage.getItem("scores")) || [];

  let csv = "Rank,Team,Score,Time\n";

  data.forEach((row,i)=>{
    let sec = Math.floor(row.time/1000);
    csv += `${i+1},${row.team},${row.score||0},${formatTime(sec)}\n`;
  });

  let blob = new Blob([csv], {type:"text/csv"});
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "leaderboard.csv";
  a.click();
}

// RESET
function resetAll(){
  localStorage.removeItem("scores");
  location.reload();
}

// FULLSCREEN
function toggleFullscreen(){
  if(!document.fullscreenElement){
    document.documentElement.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}

// INIT
window.onload = function(){
  localStorage.removeItem("scores");
  loadPanel();
};

</script>

</body>
</html>
