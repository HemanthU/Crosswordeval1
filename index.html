<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ROUND 1</title>

<style>
body{font-family:sans-serif;background:#0f172a;color:white;padding:20px;}
h1{text-align:center;color:#22c55e;}
table{width:100%;margin-top:10px;}
td,th{padding:8px;text-align:center;}
textarea,input{background:#1e293b;color:white;border:none;padding:6px;border-radius:6px;}
textarea[readonly],input[readonly]{cursor:pointer;}
button{margin:5px;padding:8px 12px;border:none;border-radius:6px;background:#22c55e;color:white;}
.reset-btn{background:red;}
</style>
</head>

<body>

<h1>ROUND 1</h1>

<input id="searchBox" placeholder="Search..." oninput="instantSearch()">

<table id="panel">
<thead>
<tr><th>Team</th><th>Score</th><th>Time</th><th>Status</th></tr>
</thead>
<tbody></tbody>
</table>

<button onclick="downloadCSV()">Download</button>
<button class="reset-btn" onclick="resetAll()">Reset</button>

<div id="board"></div>

<script>

const STORAGE_KEY="scores_round1";

const teams=["TEAM A","TEAM B","TEAM C"];

function loadPanel(){
let tbody=document.querySelector("#panel tbody");
tbody.innerHTML="";
teams.forEach((t,i)=>{
let r=document.createElement("tr");
r.innerHTML=`
<td>${t}</td>
<td><textarea id="score${i}" onkeydown="handleScore(event,${i})"></textarea></td>
<td><input id="time${i}" onkeydown="handleTime(event,${i})"></td>
<td id="status${i}">-</td>`;
tbody.appendChild(r);
});
}

function parseTimeInput(v){
v=v.replace(/\D/g,"");
if(!v) return null;
let m=0,s=0;
if(v.length>=3){s=v.slice(-2);m=v.slice(0,-2);} else s=v;
return {ms:(m*60+s)*1000,text:`${m}m ${s}s`};
}

function handleTime(e,i){
if(e.key==="Enter"){
let p=parseTimeInput(time(i).value);
if(!p) return;
let data=getData();
let row=getRow(data,i);
row.time=p.ms;row.timeText=p.text;
save(data);
time(i).readOnly=true;
time(i).ondblclick=()=>{time(i).readOnly=false};
status(i,"🟡 Pending");
}
}

function handleScore(e,i){
if(e.key==="Enter"){
let data=getData();
let row=getRow(data,i);
row.score=parseInt(score(i).value)||0;
save(data);
score(i).readOnly=true;
score(i).ondblclick=()=>{score(i).readOnly=false};
status(i,"🟢 "+row.score);
loadBoard();
}
}

function restore(){
let data=getData();
data.forEach(d=>{
let i=teams.indexOf(d.team);
if(i==-1) return;
if(d.timeText){time(i).value=d.timeText;time(i).readOnly=true;}
if(d.score!=null){score(i).value=d.score;score(i).readOnly=true;}
});
}

function loadBoard(){
let data=getData();
data.sort((a,b)=>b.score-a.score);
let html="<table><tr><th>Team</th><th>Score</th></tr>";
data.forEach(d=>html+=`<tr><td>${d.team}</td><td>${d.score||0}</td></tr>`);
html+="</table>";
document.getElementById("board").innerHTML=html;
}

function getData(){return JSON.parse(localStorage.getItem(STORAGE_KEY))||[];}
function save(d){localStorage.setItem(STORAGE_KEY,JSON.stringify(d));}
function getRow(data,i){
let row=data.find(x=>x.team===teams[i]);
if(!row){row={team:teams[i]};data.push(row);}
return row;
}
function score(i){return document.getElementById("score"+i);}
function time(i){return document.getElementById("time"+i);}
function status(i,t){document.getElementById("status"+i).innerHTML=t;}

function instantSearch(){
let val=document.getElementById("searchBox").value.toLowerCase();
document.querySelectorAll("#panel tbody tr").forEach(r=>{
r.style.display=r.cells[0].innerText.toLowerCase().includes(val)?"":"none";
});
}

function downloadCSV(){}

function resetAll(){
if(confirm("Reset?")){
localStorage.removeItem(STORAGE_KEY);
location.reload();
}
}

document.addEventListener("keydown",e=>{
if(e.ctrlKey && e.key==="x") resetAll();
});

window.onload=()=>{
loadPanel();
restore();
loadBoard();
};

</script>

</body>
</html>
