<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TECH CONNECTION</title>

<style>
html, body {
  margin:0;
  font-family:sans-serif;
  background: linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
  padding:20px;
}

h1{
  text-align:center;
  color:#22c55e;
}

.top-controls{
  text-align:center;
  margin-bottom:10px;
}

button{
  padding:8px 14px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:white;
  cursor:pointer;
  margin:5px;
}

.main-card{
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(12px);
  border-radius: 18px;
  padding: 20px;
  margin-bottom:15px;
  border: 1px solid rgba(34,197,94,0.2);
}

.inner-card{
  background: rgba(0,0,0,0.25);
  padding: 15px;
  border-radius: 12px;
}

/* LAYOUT */
.container{
  display:flex;
  gap:20px;
}

.left{ width:60%; }
.right{ width:40%; }

/* TIMER */
.timer-card{
  height:55vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

#timer{
  font-size:170px;
  font-weight:800;
  white-space: nowrap;
}

/* TABLE */
table{
  width:100%;
  border-collapse:separate;
  border-spacing:0 8px;
}

th{
  position:sticky;
  top:0;
  background:#0f172a;
  color:#22c55e;
}

td, th{
  padding:10px;
  text-align:center;
}

tbody tr{
  background: rgba(255,255,255,0.05);
  border-radius:10px;
  transition:0.3s;
}

/* highlight */
.highlight{
  background: rgba(34,197,94,0.6) !important;
}

#board table{
  font-size:14px;
}

textarea{
  width:100%;
  height:50px;
  border-radius:8px;
  border:none;
  background:rgba(255,255,255,0.1);
  color:white;
}

.search{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  margin-bottom:10px;
}
</style>
</head>

<body>

<h1>⚡ TECH CONNECTION</h1>

<div class="top-controls">
  <button onclick="startTimer()">Start Event</button>
  <button onclick="resetAll()">Reset</button>
  <button onclick="toggleFullscreen()">Fullscreen</button>
</div>

<audio id="buzzer" src="buzzer.mp3"></audio>

<div class="container">

<div class="left main-card">

  <div class="main-card timer-card">
    <h2 id="timer">20m 0s</h2>
  </div>

  <h2>🎯 Team Panel</h2>

  <div class="inner-card">
    <input id="searchBox2" class="search" placeholder="Search team..." onkeyup="filterPanel()">

    <table id="panel">
      <thead>
        <tr>
          <th>Team</th>
          <th>Score</th>
          <th>Action</th>
          <th>Time</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

</div>

<div class="right main-card">

  <h2>🏆 Leaderboard</h2>

  <div class="inner-card">
    <div id="board"></div>
  </div>

  <!-- ✅ EXPORT BUTTON -->
  <button onclick="exportCSV()">Export CSV</button>

</div>

</div>

<script>

const teams = [];
for(let i=1;i<=50;i++){ teams.push("Team "+i); }

const answers = [
  "ALGORITHM","WEB BROWSER","BACKUP","FOOD DELIVERY","VIDEO PLATFORM",
  "CLOUD","STREAMING SERVICE","PIXEL","MESSAGING APP","STACK",
  "SOCIAL MEDIA","CAB SERVICE","EMAIL","URL","PASSWORD"
];

let startTime = 0;
let timerStarted = false;

function formatTime(sec){
  return Math.floor(sec/60)+"m "+(sec%60)+"s";
}

function calculateScore(val){
  let num = val.match(/\d+/);
  let manual = num ? parseInt(num[0]) : 0;

  let txt = val.toUpperCase().replace(/[^A-Z]/g,"");
  let detected = 0;

  answers.forEach(a=>{
    if(txt.includes(a.replace(/[^A-Z]/g,""))) detected++;
  });

  return Math.max(manual, detected);
}

// TIMER
function startTimer(){
  if(timerStarted) return;
  timerStarted = true;
  startTime = Date.now();

  let duration = 20*60;
  let buzzer = document.getElementById("buzzer");

  let interval = setInterval(()=>{
    let elapsed = Math.floor((Date.now()-startTime)/1000);
    let remaining = duration - elapsed;

    if(remaining <= 0){
      document.getElementById("timer").innerText = "0m 0s";
      buzzer.play();
      clearInterval(interval);
      return;
    }

    document.getElementById("timer").innerText = formatTime(remaining);
  },1000);
}

// PANEL
function loadPanel(){
  let tbody = document.querySelector("#panel tbody");

  teams.forEach((t,i)=>{
    let row = document.createElement("tr");

    row.innerHTML = `
      <td>${t}</td>
      <td><textarea id="score${i}" 
        onkeydown="handleEnter(event,${i}); handleNav(event,${i})"></textarea></td>
      <td><button id="btn${i}" onclick="finishTeam(${i})">Finish</button></td>
      <td id="time${i}">-</td>
    `;

    tbody.appendChild(row);
  });
}

// SEARCH ENTER
document.addEventListener("keydown", function(e){

  let searchBox = document.getElementById("searchBox2");
  if(document.activeElement !== searchBox) return;

  if(e.key === "Enter"){
    e.preventDefault();

    let val = searchBox.value.toLowerCase().trim();
    if(!val) return;

    for(let i=0;i<teams.length;i++){
      if(teams[i].toLowerCase().includes(val)){

        let btn = document.getElementById("btn"+i);
        let row = btn.closest("tr");

        row.classList.add("highlight");
        setTimeout(()=> row.classList.remove("highlight"), 600);

        if(!btn.disabled){
          btn.click();
        }

        break;
      }
    }

    searchBox.value = "";
    searchBox.focus();
  }
});

// ENTER SCORE
function handleEnter(e,i){
  if(e.key==="Enter"){
    e.preventDefault();

    let val = document.getElementById("score"+i).value.trim();
    if(!val) return;

    let data = JSON.parse(localStorage.getItem("scores"))||[];
    let team = teams[i];

    let row = data.find(d=>d.team===team);

    if(!row){
      finishTeam(i);
      data = JSON.parse(localStorage.getItem("scores"))||[];
      row = data.find(d=>d.team===team);
    }

    row.score = calculateScore(val);

    localStorage.setItem("scores",JSON.stringify(data));
    loadBoard();

    document.getElementById("score"+(i+1))?.focus();
  }
}

// NAV
function handleNav(e,i){
  if(e.key==="ArrowDown"){
    e.preventDefault();
    document.getElementById("score"+(i+1))?.focus();
  }
  if(e.key==="ArrowUp"){
    e.preventDefault();
    document.getElementById("score"+(i-1))?.focus();
  }
}

// FINISH
function finishTeam(i){
  let time = Date.now() - startTime;

  document.getElementById("time"+i).innerText =
    formatTime(Math.floor(time/1000));

  document.getElementById("btn"+i).disabled = true;

  let data = JSON.parse(localStorage.getItem("scores"))||[];
  data.push({team:teams[i],time:time,score:0});
  localStorage.setItem("scores",JSON.stringify(data));

  loadBoard();
}

// FILTER
function filterPanel(){
  let s = document.getElementById("searchBox2").value.toLowerCase();
  document.querySelectorAll("#panel tbody tr").forEach(r=>{
    r.style.display = r.cells[0].innerText.toLowerCase().includes(s)?"":"none";
  });
}

// BOARD
function loadBoard(){
  let data = JSON.parse(localStorage.getItem("scores"))||[];

  data.sort((a,b)=>{
    if(b.score!==a.score) return b.score-a.score;
    return a.time-b.time;
  });

  let html="<table><tr><th>Rank</th><th>Team</th><th>Score</th><th>Time</th></tr>";

  data.forEach((d,i)=>{
    html+=`<tr>
      <td>${i+1}</td>
      <td>${d.team}</td>
      <td>${d.score}</td>
      <td>${formatTime(Math.floor(d.time/1000))}</td>
    </tr>`;
  });

  html+="</table>";
  document.getElementById("board").innerHTML=html;
}

// ✅ EXPORT CSV
function exportCSV(){
  let data = JSON.parse(localStorage.getItem("scores")) || [];

  data.sort((a,b)=>{
    if(b.score!==a.score) return b.score-a.score;
    return a.time-b.time;
  });

  let csv = "Rank,Team,Score,Time\n";

  data.forEach((row,i)=>{
    let sec = Math.floor(row.time/1000);
    csv += `${i+1},${row.team},${row.score||0},${formatTime(sec)}\n`;
  });

  let blob = new Blob([csv], {type:"text/csv"});
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "leaderboard.csv";
  a.click();
}

// RESET
function resetAll(){
  localStorage.clear();
  location.reload();
}

// FULLSCREEN
function toggleFullscreen(){
  if(!document.fullscreenElement){
    document.documentElement.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}

// INIT
window.onload = ()=>{
  localStorage.clear();
  loadPanel();
};

</script>

</body>
</html>
