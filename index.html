<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>TECH CONNECTION - ROUND 1</title>

<style>
html, body {margin:0;font-family:sans-serif;background:linear-gradient(135deg,#0f172a,#1e293b);color:white;padding:20px;}
h1{text-align:center;color:#22c55e;}

.nav{text-align:center;margin-bottom:15px;font-size:18px;}

.container{display:flex;gap:20px;}
.left{width:60%;}
.right{width:40%;}

.main-card{background:rgba(255,255,255,0.06);border-radius:18px;padding:20px;}
.inner-card{background:rgba(0,0,0,0.25);padding:15px;border-radius:12px;}

table{width:100%;border-spacing:0 8px;}
td,th{padding:10px;text-align:center;}
tbody tr{background:rgba(255,255,255,0.05);}

textarea,input{
border:none;border-radius:8px;
background:rgba(255,255,255,0.1);
color:white;
}

textarea{width:100%;height:50px;}
input{padding:6px;}

.search{width:100%;padding:10px;margin-bottom:10px;}

button{
margin-top:15px;
padding:10px 15px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
cursor:pointer;
}

.highlight{background:rgba(34,197,94,0.6)!important;}
.pending{color:#facc15;font-weight:bold;}
.done{color:#22c55e;font-weight:bold;}
</style>

</head>

<body>

<h1>⚡ TECH CONNECTION - ROUND 1 (CROSSWORD)</h1>

<div class="nav">
<a href="index.html">🧩 Round 1</a> |
<a href="round2.html">⚡ Round 2</a> |
<a href="round3.html">🎯 Round 3</a> |
<a href="round4.html">🏁 Final</a>
</div>

<div class="container">

<div class="left main-card">
<h2>🎯 Team Panel</h2>

<div class="inner-card">
<input id="searchBox" class="search" placeholder="Search team..." oninput="instantSearch()">

<table id="panel">
<thead>
<tr>
<th>Team</th>
<th>Answers</th>
<th>Time</th>
<th>Status</th>
</tr>
</thead>
<tbody></tbody>
</table>

<button onclick="downloadCSV()">⬇️ Download CSV</button>

</div>
</div>

<div class="right main-card">
<h2>🏆 Leaderboard</h2>
<div class="inner-card">
<div id="board"></div>
</div>
</div>

</div>

<script>

const STORAGE_KEY="scores_round1";
const SHEET_URL="https://script.google.com/macros/s/AKfycby_NFcu5yiiUXFgFZnXoSla7abEcXKSVDnl4Sdn-JnlRGob2ZGr3LY/exec";

const ANSWERS=[
"ALGORITHM","BROWSER","BACKUP","FOODDELIVERY","VIDEOPLATFORM",
"CLOUD","STREAMING","PIXEL","MESSAGING","STACK",
"SOCIALMEDIA","RIDESHARING","EMAIL","URL","PASSWORD"
];

const teams = [
"NEXATECH",
"TECH BUSTERS",
"MINI TECHIES",
"ALGORITHM AVENGERS",
"LOGIC LOOP",
"AMIGOS",
"QUANTUM REAPERS",
"PHOENIX",
"CODE ELITES",
"CTRL + WIN",
"PROPEL",
"ELEVATED SPARK",
"VISIONX",
"CODE CRAFTERS",
"PAT TECHIES",
"THE GLITCH",
"ONEPIECE",
"QUESTX",
"TEAMX",
"COOKIE BYTE",
"TEAM TECHS",
"TECH TITANS - ADARSH KHANGAONKAR",
"MERA BACHA HAI TU",
"ASTRIX",
"TECHTETRA",
"ELORA",
"4 BITS",
"EMPOWERX",
"DECODERS",
"DEADLINE DOMINATORS",
"THE BRAINY BUNCH",
"TECHNERS",
"BYTE CODERS",
"CODE CRASHERS",
"TECH MATES",
"RUNTIME TERROR",
"EUPHORIA",
"SCHWIFTY",
"TECH IT EASY",
"PRAGATHI",
"SURYASTRA",
"TEAM W",
"CACHE ME",
"CODE COVEN",
"ZERO MARGIN",
"404-ERROR",
"BIT BUILDERS",
"MECHMINDS",
"CODE KUTUMBA",
"TEAM INFRABYTE",
"ROYAL CHALLENGERS",
"BUNNY BUNCH",
"TELLIE TUBBIE TECHS (TTT)",
"CYBER MASTERS",
"TEAM CLUELESS",
"NEURAL NEXUS",
"ECLIPSE CODERS",
"TECH SHARK",
"FOURPRISONERS",
"TECHNO SPARKS",
"GUESS MASTERS",
"QUANTUM CODERS",
"IDLYLAKE",
"INSIDIOUS",
"BARGET AWRA SANGA",
"INFINITE LOOPERS",
"GLITCH-GOD",
"TECH TITANS - SHARANA BASAVA M",
"BILL GATES",
"NEXUS",
"TEAM SJB",
"TEEN TITANS",
"BLUE BULL",
"TEAM XYZ",
"CODEX",
"CODEBLOODED",
"SYNTAX SQUAD - AKHILA G",
"SYNTAX SQUAD - B CHANDANA",
"SHADOW DUO"
];

// SEND
function sendToSheet(team,score,time){
 fetch(SHEET_URL,{
  method:"POST",
  headers:{"Content-Type":"text/plain"},
  body:JSON.stringify({team,score,time})
 });
}

// EVALUATE
function evaluateAnswer(input){
 let words=input.toUpperCase().split(/\s+/);
 let score=0,found=[];
 words.forEach(w=>{
  let clean=w.replace(/[^A-Z]/g,"");
  if(ANSWERS.includes(clean)&&!found.includes(clean)){
   found.push(clean);score++;
  }
 });
 return {score,found};
}

// TIME
function parseTimeInput(v){
 v=v.replace(/\D/g,"");
 if(!v) return null;
 let m=0,s=0;
 if(v.length>=3){s=parseInt(v.slice(-2));m=parseInt(v.slice(0,-2));}
 else s=parseInt(v);
 return {ms:(m*60+s)*1000,text:`${m}m ${s}s`};
}

// PANEL
function loadPanel(){
 let tbody=document.querySelector("#panel tbody");
 teams.forEach((t,i)=>{
  let r=document.createElement("tr");
  r.innerHTML=`
  <td>${t}</td>
  <td><textarea id="score${i}" onkeydown="handleScore(event,${i})"></textarea></td>

  <td><input id="time${i}" onkeydown="handleTime(event,${i})"></td>
  <td id="status${i}">-</td>`;
  tbody.appendChild(r);
 });
}

// TIME
function handleTime(e,i){
if(e.key==="Enter"){
e.preventDefault();
let p=parseTimeInput(document.getElementById("time"+i).value);
if(!p) return alert("Invalid time");

let data=JSON.parse(localStorage.getItem(STORAGE_KEY))||[];
let row=data.find(d=>d.team===teams[i]);

if(!row){
row={team:teams[i],score:null,time:p.ms,timeText:p.text,sent:false};
data.push(row);
} else {
row.time=p.ms;row.timeText=p.text;row.sent=false;
}

localStorage.setItem(STORAGE_KEY,JSON.stringify(data));

let t=document.getElementById("time"+i);
t.disabled=true;
t.ondblclick=()=>{t.disabled=false;};

document.getElementById("status"+i).innerHTML='<span class="pending">🟡 Pending</span>';
document.getElementById("score"+i).focus();
loadBoard();
}
}

// SCORE
function handleScore(e,i){
if(e.key==="Enter"){
e.preventDefault();
let val=document.getElementById("score"+i).value.trim();
if(!val) return;

let data=JSON.parse(localStorage.getItem(STORAGE_KEY))||[];
let row=data.find(d=>d.team===teams[i]);

if(!row) return alert("Enter time first!");

let result=evaluateAnswer(val);
row.score=result.score;
row.answers=result.found;
row.sent=false;

document.getElementById("score"+i).value=result.found.join(", ");

if(!row.sent){
sendToSheet(row.team,row.score,row.timeText);
row.sent=true;
}

let s=document.getElementById("score"+i);
s.disabled=true;
s.ondblclick=()=>{s.disabled=false;};

document.getElementById("status"+i).innerHTML=`<span class="done">🟢 ${result.score} correct</span>`;

localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
loadBoard();
}
}

// SEARCH
function instantSearch(){
let val=document.getElementById("searchBox").value.toLowerCase();
let rows=document.querySelectorAll("#panel tbody tr");
let first=null;

rows.forEach(r=>{
let t=r.cells[0].innerText.toLowerCase();
if(t.includes(val)){
r.style.display="";
if(!first) first=r;
} else r.style.display="none";
});

if(first && val){
first.classList.add("highlight");
first.scrollIntoView({behavior:"smooth",block:"center"});
setTimeout(()=>first.classList.remove("highlight"),400);
}
}

// BOARD
function loadBoard(){
let data=JSON.parse(localStorage.getItem(STORAGE_KEY))||[];

data.sort((a,b)=>{
let s1=b.score??-1,s2=a.score??-1;
if(s1!==s2) return s1-s2;
return (a.time||Infinity)-(b.time||Infinity);
});

let html="<table><tr><th>Rank</th><th>Team</th><th>Score</th><th>Time</th></tr>";

data.forEach((d,i)=>{
html+=`<tr>

<td>${i+1}</td>
<td>${d.team}</td>
<td>${d.score??"-"}</td>

<td>${d.timeText??"-"}</td>
</tr>`;
});

html+="</table>";
document.getElementById("board").innerHTML=html;
}

// CSV
function downloadCSV(){
let data=JSON.parse(localStorage.getItem(STORAGE_KEY))||[];
data=data.filter(d=>d.score!=null);

data.sort((a,b)=>{
let s1=b.score??-1,s2=a.score??-1;
if(s1!==s2) return s1-s2;
return (a.time||Infinity)-(b.time||Infinity);
});

let csv="Rank,Team,Score,Time\n";

data.forEach((d,i)=>{
csv+=`${i+1},${d.team},${d.score},${d.timeText||""}\n`;
});

let blob=new Blob([csv],{type:"text/csv"});
let url=URL.createObjectURL(blob);

let a=document.createElement("a");
a.href=url;
a.download=STORAGE_KEY+".csv";
a.click();
}

// INIT
window.onload=()=>{
loadPanel();
loadBoard();
};

</script>

</body>
</html>
