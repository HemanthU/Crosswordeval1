<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TECH CONNECTION</title>

<style>
html, body {
  margin:0;
  font-family:sans-serif;
  background: linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
  padding:20px;
}

h1{
  text-align:center;
  color:#22c55e;
}

.top-controls{
  text-align:center;
  margin-bottom:10px;
}

button{
  padding:8px 14px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:white;
  cursor:pointer;
  margin:5px;
}

.main-card{
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(12px);
  border-radius: 18px;
  padding: 20px;
  margin-bottom:15px;
  border: 1px solid rgba(34,197,94,0.2);
}

.inner-card{
  background: rgba(0,0,0,0.25);
  padding: 15px;
  border-radius: 12px;
}

/* LAYOUT */
.container{
  display:flex;
  gap:20px;
}

.left{ width:70%; }
.right{ width:30%; }

/* TIMER */
.timer-card{
  height:55vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

#timer{
  font-size:220px;
  font-weight:800;
  white-space: nowrap;
  line-height:1;
  margin:0;
}

/* TABLE CARD STYLE */
table{
  width:100%;
  border-collapse:separate;
  border-spacing:0 8px;
}

th{
  position:sticky;
  top:0;
  background:#0f172a;
  color:#22c55e;
  font-weight:600;
}

td, th{
  padding:10px;
  text-align:center;
}

tbody tr{
  background: rgba(255,255,255,0.05);
  border-radius:10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

tbody tr:hover{
  background: rgba(34,197,94,0.15);
  transform: scale(1.01);
  transition: 0.2s;
}

/* INPUT */
textarea{
  width:100%;
  height:50px;
  border-radius:8px;
  border:none;
  background:rgba(255,255,255,0.1);
  color:white;
}

.search{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  margin-bottom:10px;
}
</style>
</head>

<body>

<h1>⚡ TECH CONNECTION</h1>

<div class="top-controls">
  <button onclick="startTimer()">Start Event</button>
  <button onclick="resetAll()">Reset</button>
  </div>

<audio id="buzzer" src="buzzer.mp3" preload="auto"></audio>

<div class="container">

<div class="left main-card">

  <div class="main-card timer-card">
    <h2 id="timer">20m 0s</h2>
  </div>

  <h2>🎯 Team Panel</h2>

  <div class="inner-card">
    <input id="searchBox2" class="search" placeholder="Search team..." onkeyup="filterPanel()">

    <table id="panel">
      <thead>
      <tr>
        <th>Team</th>
        <th>Score</th>
        <th>Action</th>
        <th>Time</th>
      </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <button onclick="updateScores()">Update Scores</button>

</div>

<div class="right main-card">

  <h2>🏆 Leaderboard</h2>

  <div class="inner-card">
    <div id="board"></div>
  </div>

  <button onclick="exportCSV()">Export CSV</button>

</div>

</div>

<script>

// AUTO FIT TIMER
function autoFitTimer(){
  const el = document.getElementById("timer");
  let size = 220;
  el.style.fontSize = size + "px";

  while(el.scrollWidth > el.clientWidth && size > 40){
    size -= 2;
    el.style.fontSize = size + "px";
  }
}

// FULLSCREEN
function toggleFullscreen(){
  if(!document.fullscreenElement){
    document.documentElement.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}

// TEAMS
const teams = [];
for(let i=1;i<=50;i++){ teams.push("Team "+i); }

let startTime = 0;
let timerStarted = false;

// FORMAT
function formatTime(sec){
  return Math.floor(sec/60)+"m "+(sec%60)+"s";
}

// TIMER
function startTimer(){
  if(timerStarted) return;
  timerStarted = true;
  startTime = Date.now();

  let duration = 20 * 60;
  let sound = document.getElementById("buzzer");
  sound.play().then(()=> sound.pause());

  let interval = setInterval(()=>{
    let elapsed = Math.floor((Date.now()-startTime)/1000);
    let remaining = duration - elapsed;

    if(remaining <= 0){
      document.getElementById("timer").innerText = "0m 0s";
      autoFitTimer();
      sound.currentTime = 0;
      sound.play();
      clearInterval(interval);
      return;
    }

    document.getElementById("timer").innerText = formatTime(remaining);
    autoFitTimer();

  },1000);
}

// LOAD PANEL
function loadPanel(){
  let tbody = document.querySelector("#panel tbody");

  for(let i=0;i<teams.length;i++){
    let row = document.createElement("tr");

    row.innerHTML =
      "<td>"+teams[i]+"</td>"+
      "<td><textarea id='score"+i+"'></textarea></td>"+
      "<td><button id='btn"+i+"' onclick='finishTeam("+i+")'>Finish</button></td>"+
      "<td id='time"+i+"'>-</td>";

    tbody.appendChild(row);
  }
}

// FINISH
function finishTeam(i){
  let time = Date.now() - startTime;

  document.getElementById("time"+i).innerText =
    formatTime(Math.floor(time/1000));

  document.getElementById("btn"+i).disabled = true;

  let data = JSON.parse(localStorage.getItem("scores")) || [];
  data.push({team:teams[i], time:time, score:null});
  localStorage.setItem("scores", JSON.stringify(data));

  loadBoard();
}

// FILTER
function filterPanel(){
  let search = document.getElementById("searchBox2").value.toLowerCase();
  let rows = document.querySelectorAll("#panel tbody tr");

  rows.forEach(row=>{
    let team = row.cells[0].innerText.toLowerCase();
    row.style.display = team.includes(search) ? "" : "none";
  });
}

// LEADERBOARD
function loadBoard(){
  let data = JSON.parse(localStorage.getItem("scores")) || [];

  data.sort((a,b)=>{
    if((b.score||0)!==(a.score||0)){
      return (b.score||0)-(a.score||0);
    }
    return a.time - b.time;
  });

  let html = "<table><thead><tr><th>Rank</th><th>Team</th><th>Score</th><th>Time</th></tr></thead><tbody>";

  data.forEach((d,i)=>{
    html += `<tr>
      <td>${i+1}</td>
      <td>${d.team}</td>
      <td>${d.score||"-"}</td>
      <td>${formatTime(Math.floor(d.time/1000))}</td>
    </tr>`;
  });

  html += "</tbody></table>";
  document.getElementById("board").innerHTML = html;
}

// RESET
function resetAll(){
  localStorage.removeItem("scores");
  location.reload();
}

// INIT
window.onload = function(){
  localStorage.removeItem("scores");
  loadPanel();
};
</script>

</body>
</html>
