<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TECH CONNECTION</title>

<style>
html, body {
  margin:0;
  font-family:sans-serif;
  background: linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
  padding:20px;
}

/* HEADER */
h1{
  text-align:center;
  color:#22c55e;
}

/* CONTROLS */
.top-controls{
  text-align:center;
  margin-bottom:10px;
}

/* BUTTON */
button{
  padding:8px 14px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:white;
  cursor:pointer;
  margin:5px;
}

/* MAIN CARD */
.main-card{
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(12px);
  border-radius: 18px;
  padding: 20px;
  margin-bottom:15px;
  border: 1px solid rgba(34,197,94,0.2);
}

/* INNER CARD */
.inner-card{
  background: rgba(0,0,0,0.25);
  padding: 15px;
  border-radius: 12px;
}

/* LAYOUT */
.container{
  display:flex;
  gap:20px;
}

.left{ width:60%; }
.right{ width:40%; }

/* TIMER */
.timer-card{
  height:45vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

#timer{
  font-size: clamp(200px, 13vw, 280px);
  font-weight:800;
  white-space: nowrap;
  line-height:1;
  margin:0;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:6px 8px;
  text-align:center;
}

th{
  position:sticky;
  top:0;
  background:#1e293b;
}

/* COMPACT LEADERBOARD */
#board table{
  table-layout:fixed;
  font-size:16px;
}

#board th:nth-child(1), #board td:nth-child(1){ width:60px; }
#board th:nth-child(2), #board td:nth-child(2){ width:120px; }
#board th:nth-child(3), #board td:nth-child(3){ width:80px; }
#board th:nth-child(4), #board td:nth-child(4){ width:100px; }

/* INPUT */
textarea{
  width:100%;
  height:50px;
  border-radius:8px;
  border:none;
  background:rgba(255,255,255,0.1);
  color:white;
}

/* SEARCH */
.search{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  margin-bottom:10px;
}
</style>
</head>

<body>

<h1>⚡ TECH CONNECTION</h1>

<div class="top-controls">
  <button onclick="startTimer()">Start Event</button>
  <button onclick="resetAll()">Reset</button>
  <button onclick="toggleFullscreen()">Fullscreen</button>
</div>

<div class="container">

<!-- LEFT -->
<div class="left main-card">

  <div class="main-card timer-card">
    <h2 id="timer">0m 0s</h2>
  </div>

  <h2>🎯 Team Panel</h2>

  <div class="inner-card">
    <input id="searchBox2" class="search" placeholder="Search team..." onkeyup="filterPanel()">

    <table id="panel">
      <tr>
        <th>Team</th>
        <th>Score</th>
        <th>Action</th>
        <th>Time</th>
      </tr>
    </table>
  </div>

  <button onclick="updateScores()">Update Scores</button>

</div>

<!-- RIGHT -->
<div class="right main-card">

  <h2>🏆 Leaderboard</h2>

  <div class="inner-card">
    <div id="board"></div>
  </div>

  <button onclick="exportCSV()">Export CSV</button>

</div>

</div>

<script>

// FULLSCREEN
function toggleFullscreen(){
  if(!document.fullscreenElement){
    document.documentElement.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}

// TEAMS
const teams = [];
for(let i=1;i<=50;i++){ teams.push("Team "+i); }

// 🔥 ANSWERS BACK
const answers = [
  "ALGORITHM","WEB BROWSER","BACKUP","FOOD DELIVERY","VIDEO PLATFORM",
  "CLOUD","STREAMING SERVICE","PIXEL","MESSAGING APP","STACK",
  "SOCIAL MEDIA","CAB SERVICE","EMAIL","URL","PASSWORD"
];

let startTime = 0;
let timerStarted = false;

// FORMAT
function formatTime(sec){
  return Math.floor(sec/60)+"m "+(sec%60)+"s";
}

// CLEAN TEXT
function cleanText(t){
  return t.toUpperCase().replace(/[^A-Z]/g,"");
}

// TIMER
function startTimer(){
  if(timerStarted) return;
  timerStarted = true;
  startTime = Date.now();

  setInterval(()=>{
    let t = Math.floor((Date.now()-startTime)/1000);
    document.getElementById("timer").innerText = formatTime(t);
  },1000);
}

// LOAD PANEL
function loadPanel(){
  let table = document.getElementById("panel");

  for(let i=0;i<teams.length;i++){
    let row = table.insertRow(-1);

    row.innerHTML =
      "<td>"+teams[i]+"</td>"+
      "<td><textarea id='score"+i+"'></textarea></td>"+
      "<td><button id='btn"+i+"' onclick='finishTeam("+i+")'>Finish</button></td>"+
      "<td id='time"+i+"'>-</td>";
  }
}

// FINISH
function finishTeam(i){
  let time = Date.now() - startTime;

  document.getElementById("time"+i).innerText =
    formatTime(Math.floor(time/1000));

  document.getElementById("btn"+i).disabled = true;

  let data = JSON.parse(localStorage.getItem("scores")) || [];
  data.push({team:teams[i], time:time, score:null});
  localStorage.setItem("scores", JSON.stringify(data));

  loadBoard();
  document.getElementById("searchBox2").focus();
}

// 🔥 UPDATE SCORES (RESTORED)
function updateScores(){

  let data = JSON.parse(localStorage.getItem("scores")) || [];

  for(let j=0;j<data.length;j++){

    let row = data[j];
    let index = teams.indexOf(row.team);

    let val = document.getElementById("score"+index).value;
    if(!val) continue;

    let num = val.match(/\d+/);
    let manual = num ? parseInt(num[0]) : 0;

    let txt = cleanText(val);
    let detected = 0;

    for(let k=0;k<answers.length;k++){
      if(txt.includes(cleanText(answers[k]))){
        detected++;
      }
    }

    row.score = Math.max(manual, detected);
  }

  localStorage.setItem("scores", JSON.stringify(data));
  loadBoard();
}

// ENTER SUPPORT
document.addEventListener("keydown", function(e){
  if(e.key === "Enter"){
    let searchBox = document.getElementById("searchBox2");
    let search = searchBox.value.toLowerCase();

    if(!search) return;

    for(let i=0;i<teams.length;i++){
      if(teams[i].toLowerCase().includes(search)){
        let btn = document.getElementById("btn"+i);
        if(!btn.disabled){
          btn.click();
        }
        break;
      }
    }

    searchBox.value = "";
    searchBox.focus();
  }
});

// FILTER
function filterPanel(){
  let search = document.getElementById("searchBox2").value.toLowerCase();
  let rows = document.querySelectorAll("#panel tr");

  for(let i=1;i<rows.length;i++){
    let team = rows[i].cells[0].innerText.toLowerCase();
    rows[i].style.display = team.includes(search) ? "" : "none";
  }
}

// LEADERBOARD
function loadBoard(){
  let data = JSON.parse(localStorage.getItem("scores")) || [];

  let html = "<table><tr><th>Rank</th><th>Team</th><th>Score</th><th>Time</th></tr>";

  data.sort((a,b)=>{
    if((b.score||0)!==(a.score||0)){
      return (b.score||0)-(a.score||0);
    }
    return a.time - b.time;
  });

  for(let i=0;i<data.length;i++){
    let sec = Math.floor(data[i].time/1000);

    html += "<tr>"+
      "<td>"+(i+1)+"</td>"+
      "<td>"+data[i].team+"</td>"+
      "<td>"+(data[i].score||"-")+"</td>"+
      "<td>"+formatTime(sec)+"</td>"+
    "</tr>";
  }

  html += "</table>";

  document.getElementById("board").innerHTML = html;
}

// EXPORT
function exportCSV(){
  let data = JSON.parse(localStorage.getItem("scores")) || [];

  let csv = "Rank,Team,Score,Time\n";

  data.forEach((row,i)=>{
    let sec = Math.floor(row.time/1000);
    csv += `${i+1},${row.team},${row.score||0},${formatTime(sec)}\n`;
  });

  let blob = new Blob([csv], {type:"text/csv"});
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "leaderboard.csv";
  a.click();
}

// RESET
function resetAll(){
  localStorage.removeItem("scores");
  location.reload();
}

// INIT
window.onload = function(){
  localStorage.removeItem("scores");
  loadPanel();
};

</script>

</body>
</html>
