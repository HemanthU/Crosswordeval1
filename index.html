<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TECH CONNECTION</title>

<style>
html, body {
  margin:0;
  font-family:sans-serif;
  background: linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
  padding:20px;
}

h1{text-align:center;color:#22c55e;}

.container{display:flex;gap:20px;}
.left{width:60%;}
.right{width:40%;}

.main-card{
  background: rgba(255,255,255,0.06);
  border-radius:18px;
  padding:20px;
}

.inner-card{
  background: rgba(0,0,0,0.25);
  padding:15px;
  border-radius:12px;
}

table{width:100%;border-spacing:0 8px;}
td,th{padding:10px;text-align:center;}
tbody tr{background: rgba(255,255,255,0.05);}

textarea,input{
  border:none;
  border-radius:8px;
  background:rgba(255,255,255,0.1);
  color:white;
}

textarea{width:100%;height:50px;}
input{padding:6px;}

.search{width:100%;padding:10px;margin-bottom:10px;}

.highlight{background: rgba(34,197,94,0.6) !important;}
.pending{color:#facc15;font-weight:bold;}
.done{color:#22c55e;font-weight:bold;}
</style>
</head>

<body>

<h1>⚡ TECH CONNECTION</h1>

<div class="container">

<div class="left main-card">
<h2>🎯 Team Panel</h2>

<div class="inner-card">
<input id="searchBox2" class="search" placeholder="Search team..." oninput="instantSearch()">

<table id="panel">
<thead>
<tr>
<th>Team</th>
<th>Score</th>
<th>Time</th>
<th>Status</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>
</div>

<div class="right main-card">
<h2>🏆 Leaderboard</h2>
<div class="inner-card">
<div id="board"></div>
</div>
</div>

</div>

<script>

// 🔥 CONFIG
const STORAGE_KEY = "scores_round1"; // change for round2/3
const SHEET_URL = "PASTE_YOUR_URL_HERE";

// 🔥 TEAMS (PASTE FULL LIST)
const teams = [
"NEXATECH","TECH BUSTERS","MINI TECHIES","ALGORITHM AVENGERS","LOGIC LOOP"
];

let lastState = null;

// 🔗 SEND TO SHEET (UPDATE MODE)
function sendToSheet(team,score,time){
  fetch(SHEET_URL,{
    method:"POST",
    headers:{ "Content-Type":"text/plain" },
    body: JSON.stringify({team,score,time})
  });
}

// 🔄 FETCH FROM SHEET (LIVE SYNC)
function fetchFromSheet(){
  fetch(SHEET_URL)
    .then(res=>res.json())
    .then(data=>{
      localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
      loadBoard();
    });
}

// ⏱ TIME PARSER
function parseTimeInput(val){
  val = val.replace(/\D/g,"");
  if(!val) return null;

  let min=0,sec=0;

  if(val.length>=3){
    sec=parseInt(val.slice(-2));
    min=parseInt(val.slice(0,-2));
  } else sec=parseInt(val);

  return {ms:(min*60+sec)*1000,text:`${min}m ${sec}s`};
}

// 📋 LOAD PANEL
function loadPanel(){
  let tbody=document.querySelector("#panel tbody");

  teams.forEach((t,i)=>{
    let row=document.createElement("tr");

    row.innerHTML=`
      <td>${t}</td>
      <td><textarea id="score${i}" onkeydown="handleScore(event,${i})"></textarea></td>
      <td><input id="time${i}" onkeydown="handleTime(event,${i})"></td>
      <td id="status${i}">-</td>
    `;

    tbody.appendChild(row);
  });
}

// ⏱ TIME ENTER
function handleTime(e,i){
  if(e.key==="Enter"){
    e.preventDefault();

    let parsed=parseTimeInput(document.getElementById("time"+i).value);
    if(!parsed) return alert("Invalid time");

    lastState=localStorage.getItem(STORAGE_KEY);

    let data=JSON.parse(localStorage.getItem(STORAGE_KEY))||[];

    let row=data.find(d=>d.team===teams[i]);

    if(!row){
      row={team:teams[i],score:null,time:parsed.ms,timeText:parsed.text,sent:false};
      data.push(row);
    } else {
      row.time=parsed.ms;
      row.timeText=parsed.text;
    }

    localStorage.setItem(STORAGE_KEY,JSON.stringify(data));

    document.getElementById("time"+i).disabled=true;
    document.getElementById("status"+i).innerHTML='<span class="pending">🟡 Pending</span>';

    document.getElementById("score"+i).focus();

    loadBoard();
  }
}

// 🧮 SCORE ENTER
function handleScore(e,i){
  if(e.key==="Enter"){
    e.preventDefault();

    let val=document.getElementById("score"+i).value.trim();
    if(!val) return;

    let data=JSON.parse(localStorage.getItem(STORAGE_KEY))||[];
    let row=data.find(d=>d.team===teams[i]);

    if(!row) return alert("Enter time first!");

    row.score=parseInt(val)||0;

    if(!row.sent){
      sendToSheet(row.team,row.score,row.timeText);
      row.sent=true;
    }

    document.getElementById("score"+i).disabled=true;
    document.getElementById("status"+i).innerHTML='<span class="done">🟢 Submitted</span>';

    localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
    loadBoard();

    document.getElementById("score"+(i+1))?.focus();
  }
}

// 🔍 SEARCH
function instantSearch(){
  let val=document.getElementById("searchBox2").value.toLowerCase();
  let rows=document.querySelectorAll("#panel tbody tr");
  let first=null;

  rows.forEach(r=>{
    let t=r.cells[0].innerText.toLowerCase();
    if(t.includes(val)){
      r.style.display="";
      if(!first) first=r;
    } else r.style.display="none";
  });

  if(first && val){
    first.classList.add("highlight");
    first.scrollIntoView({behavior:"smooth",block:"center"});
    setTimeout(()=>first.classList.remove("highlight"),400);
  }

  highlightLeaderboard(val);
}

// 🏆 LEADERBOARD
function loadBoard(){
  let data=JSON.parse(localStorage.getItem(STORAGE_KEY))||[];

  data.sort((a,b)=>{
    let s1=b.score??-1;
    let s2=a.score??-1;
    if(s1!==s2) return s1-s2;
    return (a.time||Infinity)-(b.time||Infinity);
  });

  let html="<table><tr><th>Rank</th><th>Team</th><th>Score</th><th>Time</th></tr>";

  data.forEach((d,i)=>{
    html+=`<tr>
      <td>${i+1}</td>
      <td>${d.team}</td>
      <td>${d.score ?? "-"}</td>
      <td>${d.timeText ?? "-"}</td>
    </tr>`;
  });

  html+="</table>";
  document.getElementById("board").innerHTML=html;
}

// 🔁 UNDO (CTRL+Z)
document.addEventListener("keydown",function(e){
  if(e.ctrlKey && e.key==="z"){
    e.preventDefault();

    if(lastState){
      localStorage.setItem(STORAGE_KEY,lastState);
      loadBoard();

      JSON.parse(lastState).forEach(r=>{
        if(r.score!=null){
          sendToSheet(r.team,r.score,r.timeText);
        }
      });

      location.reload();
    }
  }
});

// 🚀 INIT
window.onload=()=>{
  loadPanel();
  loadBoard();
  setInterval(fetchFromSheet,3000);
};

</script>

</body>
</html>
